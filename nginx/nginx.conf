# nginx.conf — SSL termination proxy para PGEO
#
# Requisitos:
#   /etc/nginx/certs/server.crt  — certificado (autoassinado ou CA real)
#   /etc/nginx/certs/server.key  — chave privada correspondente
#
# Para gerar um certificado autoassinado: ./gen-self-signed.sh

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent"';
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout 65;

    # Desabilita versão do nginx nos cabeçalhos de erro
    server_tokens off;

    # ── Redirecionamento HTTP → HTTPS ────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS com proxy reverso para o Spring Boot ───────────────────
    server {
        listen 443 ssl;
        server_name _;

        # Certificados TLS
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # Protocolos e cifras seguras (TLS 1.2+)
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       1d;
        ssl_session_tickets       off;

        # Tamanho máximo do body (ajustar se houver upload de arquivos)
        client_max_body_size 10m;

        # ── Proxy para o Spring Boot ─────────────────────────────────
        location / {
            proxy_pass         http://app:8080;
            proxy_http_version 1.1;

            # Cabeçalhos para o Spring Boot saber o IP e protocolo reais
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Port  $server_port;

            # Suporte a WebSocket (SockJS / STOMP)
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";

            proxy_read_timeout  300s;
            proxy_connect_timeout 75s;
        }
    }
}
