# =============================================
# PGEO — Configuração base
# Perfil ativo definido pela variável SPRING_PROFILES_ACTIVE
# dev   → banco local / H2 (sem Docker)
# prod  → PostgreSQL via Docker
# =============================================
spring.application.name=pgeo
# PORT é injetado dinamicamente por PaaS como Railway; 8080 é o fallback local/Docker
server.port=${PORT:8080}

# Perfil padrão se nenhum for informado
spring.profiles.active=${SPRING_PROFILES_ACTIVE:prod}

# Upload de arquivos (Excel)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Limite de POST (exceto uploads, que têm limite próprio de 10MB)
server.tomcat.max-http-form-post-size=1MB
server.tomcat.max-swallow-size=2MB

# Desabilita Whitelabel error page (usa templates/error.html)
server.error.whitelabel.enabled=false
server.error.include-stacktrace=never
server.error.include-message=never

# Thymeleaf
spring.thymeleaf.encoding=UTF-8

# Segurança
app.secret-key=${SECRET_KEY}

# Usuários padrão (seed inicial) — sobrescreva via env vars em produção
pgeo.seed.admin.senha=${ADMIN_PASSWORD:admin@123}
pgeo.seed.operador.senha=${OPERADOR_PASSWORD:oper@123}
pgeo.seed.visualizador.senha=${VISUALIZADOR_PASSWORD:view@123}

# ── E-mail — notificações de ASO ─────────────────────────────
# Em dev, email desabilitado. Configure em application-prod.properties para ativar.
spring.mail.host=localhost
spring.mail.port=1025
pgeo.notificacao.email.habilitado=false
pgeo.notificacao.email.destinatario=sesmt@hospital.local
pgeo.notificacao.email.remetente=pgeo@noreply.local
pgeo.notificacao.email.dias-aviso=30

