# =============================================
# PGEO — Perfil PRODUÇÃO (Docker / servidor TI)
# Ativado com: SPRING_PROFILES_ACTIVE=prod
# Todas as variáveis vêm do docker-compose.yml
# =============================================

# ── Banco de Dados ────────────────────────────
spring.datasource.url=jdbc:postgresql://${DB_HOST:db}:${DB_PORT:5432}/${DB_NAME:pgeo_db}
spring.datasource.username=${DB_USER:pgeo_user}
spring.datasource.password=${DB_PASSWORD:pgeo_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de conexões
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ── JPA ───────────────────────────────────────
# validate: Flyway gerencia o schema — JPA só valida
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Flyway ────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# ── Thymeleaf ─────────────────────────────────
# Cache ATIVADO em produção (melhora performance)
spring.thymeleaf.cache=true

# ── Logging ───────────────────────────────────
logging.level.com.sesmt.pgeo=INFO
logging.level.org.springframework.security=WARN
logging.level.org.flywaydb=INFO
# Logs em arquivo para a TI consultar
logging.file.name=/app/logs/pgeo.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30

# ── Actuator — health check para Docker ───────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
# Só expõe /actuator/health — nada mais
management.endpoints.web.base-path=/actuator

# ── Swagger / OpenAPI desabilitado em produção ─
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# ── Locale BR — datas e formatação ────────────
spring.web.locale=pt_BR
spring.web.locale-resolver=fixed

# ── Sessão ────────────────────────────────────
# Expira sessão após 4 horas de inatividade
# O usuário é redirecionado para /login?expired=true
server.servlet.session.timeout=4h
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true

# ── Proxy Reverso (nginx) ─────────────────────
# Necessário para que o Spring Boot leia X-Forwarded-Proto corretamente
# e saiba que a requisição chegou via HTTPS mesmo sendo HTTP internamente.
server.forward-headers-strategy=native
server.servlet.session.cookie.same-site=strict

# ── E-mail — notificações de ASO (via env vars no docker-compose) ─────
spring.mail.host=${SMTP_HOST:localhost}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_TLS:false}
pgeo.notificacao.email.habilitado=${NOTIFICACAO_EMAIL_HABILITADO:false}
pgeo.notificacao.email.destinatario=${NOTIFICACAO_EMAIL_DESTINATARIO:sesmt@hospital.local}
pgeo.notificacao.email.remetente=${NOTIFICACAO_EMAIL_REMETENTE:pgeo@noreply.local}
pgeo.notificacao.email.dias-aviso=${NOTIFICACAO_EMAIL_DIAS_AVISO:30}
