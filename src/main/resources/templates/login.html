<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — PGEO</title>
  <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
  <link rel="stylesheet" th:href="@{/css/global.css}">
  <script th:src="@{/js/theme.js}"></script>
</head>
<body class="no-navbar">

<div class="login-card">
  <div class="theme-row">
    <button class="btn-theme">🌙</button>
  </div>

  <div class="login-logo">
    <span class="brand-icon">🏥</span>
    <h1>PGEO</h1>
    <p>Sistema de Exames Ocupacionais — SESMT</p>
  </div>

  <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>
  <div th:if="${info}" class="alert alert-success" th:text="${info}"></div>

  <form th:action="@{/login}" method="post">
    <div class="form-group">
      <label class="form-label" for="username">Usuário</label>
      <input class="form-control" type="text" id="username" name="username"
             placeholder="Seu usuário" required autofocus>
    </div>
    <div class="form-group">
      <label class="form-label" for="password">Senha</label>
      <input class="form-control" type="password" id="password" name="password"
             placeholder="Sua senha" required>
    </div>
    <button type="submit" class="btn btn-success btn-block btn-lg mt-8">
      Entrar
    </button>
  </form>
</div>

</body>
</html>
