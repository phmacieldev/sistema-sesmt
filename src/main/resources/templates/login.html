<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — PGEO</title>
  <link rel="stylesheet" th:href="@{/css/global.css}">
  <script th:src="@{/js/theme.js}"></script>
  <style>
    body.no-navbar {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 16px;
    }
    .login-card {
      width: 100%; max-width: 380px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 36px 32px;
      box-shadow: var(--shadow-lg);
    }
    .login-logo { text-align: center; margin-bottom: 24px; }
    .login-logo .brand-icon { font-size: 40px; display: block; margin-bottom: 8px; }
    .login-logo h1 { font-size: 24px; font-weight: 700; color: var(--text); margin: 0; }
    .login-logo p  { font-size: 13px; color: var(--text-muted); margin: 4px 0 0; }
    .theme-row { display: flex; justify-content: flex-end; margin-bottom: 8px; }
  </style>
</head>
<body class="no-navbar">

<div class="login-card">
  <div class="theme-row">
    <button class="btn-theme">🌙</button>
  </div>

  <div class="login-logo">
    <span class="brand-icon">🏥</span>
    <h1>PGEO</h1>
    <p>Sistema de Exames Ocupacionais — SESMT</p>
  </div>

  <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>
  <div th:if="${info}" class="alert alert-success" th:text="${info}"></div>

  <form th:action="@{/login}" method="post">
    <div class="form-group">
      <label class="form-label" for="username">Usuário</label>
      <input class="form-control" type="text" id="username" name="username"
             placeholder="Seu usuário" required autofocus>
    </div>
    <div class="form-group">
      <label class="form-label" for="password">Senha</label>
      <input class="form-control" type="password" id="password" name="password"
             placeholder="Sua senha" required>
    </div>
    <button type="submit" class="btn btn-success btn-block btn-lg" style="margin-top:8px">
      Entrar
    </button>
  </form>
</div>

</body>
</html>
