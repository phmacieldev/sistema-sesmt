<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lançar Atestado — PGEO</title>
  <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
  <link rel="stylesheet" th:href="@{/css/global.css}">
  <link rel="stylesheet" th:href="@{/webjars/flatpickr/dist/flatpickr.min.css}">
  <script th:src="@{/js/theme.js}"></script>
  <style th:attr="nonce=${cspNonce}">.suggest-item:hover { background: var(--bg-table-hover); }</style>
</head>
<body>
<div th:replace="~{components/navbar :: navbar}"></div>

<div class="page-wrapper pw-580">
  <div class="page-header">
    <a th:href="@{/atestados(semana=${semanaInicio})}" class="btn btn-secondary btn-sm">← Voltar</a>
    <div class="page-title" th:text="${edicao} ? '✏️ Editar Atestado' : '📄 Lançar Atestado'">Atestado</div>
  </div>

  <div class="card">
    <form th:action="${edicao} ? @{/atestados/{id}/editar(id=${atestado.id})} : @{/atestados/novo}" method="POST">
      <input type="hidden" name="semanaInicio" th:value="${semanaInicio}">

      <!-- Busca de funcionário -->
      <div class="form-group">
        <label class="form-label">Funcionário</label>
        <input type="text" id="buscaFunc" class="form-control" placeholder="🔍 Digite matrícula ou nome..."
               th:value="${edicao and atestado.funcionario != null ? atestado.funcionario.nome : ''}"
               autocomplete="off">
        <input type="hidden" id="funcionarioId" name="funcionarioId"
               th:value="${edicao and atestado.funcionario != null ? atestado.funcionario.id : ''}">
        <div id="suggestBox" style="position:relative">
          <div id="suggestions" style="display:none; position:absolute; z-index:100; width:100%;
               background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-sm);
               max-height:200px; overflow-y:auto; box-shadow:var(--shadow-lg)"></div>
        </div>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Data do Atestado</label>
          <input type="text" id="dataAfastamento" name="dataAfastamento" class="form-control"
                 th:value="${edicao ? atestado.dataAfastamento : ''}" placeholder="Selecione" required>
        </div>
        <div class="form-group">
          <label class="form-label">Dias de Afastamento</label>
          <input type="number" name="diasAfastamento" class="form-control" min="1" max="365"
                 th:value="${edicao ? atestado.diasAfastamento : ''}" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Tipo <small>(obrigatório)</small></label>
        <select name="tipo" class="form-control" required>
          <option th:each="t : ${tipos}" th:value="${t}" th:text="${t.descricao}"
                  th:selected="${edicao and t == atestado.tipo}"></option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">CID <small>(opcional)</small></label>
        <input type="text" name="cid" class="form-control" maxlength="10"
               th:value="${edicao ? atestado.cid : ''}" placeholder="Ex: J11, M54.5">
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Nome do Médico <small>(opcional)</small></label>
          <input type="text" name="medicoNome" class="form-control"
                 th:value="${edicao ? atestado.medicoNome : ''}" placeholder="Dr. Nome Sobrenome">
        </div>
        <div class="form-group">
          <label class="form-label">CRM <small>(opcional)</small></label>
          <input type="text" name="medicoCrm" class="form-control"
                 th:value="${edicao ? atestado.medicoCrm : ''}" placeholder="Ex: CRM 12345">
        </div>
      </div>

      <button type="submit" class="btn btn-success btn-block btn-lg">
        <span th:text="${edicao} ? 'Salvar Alterações' : 'Lançar Atestado'">Salvar</span>
      </button>
      <a th:href="@{/atestados(semana=${semanaInicio})}" class="btn btn-secondary btn-block btn-lg mt-8">Cancelar</a>
    </form>
  </div>
</div>

<script th:src="@{/webjars/flatpickr/dist/flatpickr.min.js}"></script>
<script th:attr="nonce=${cspNonce}">
  flatpickr("#dataAfastamento", {
    dateFormat: "Y-m-d", altInput: true, altFormat: "d/m/Y",
    locale: { firstDayOfWeek: 1 }
  });

  const buscaInput = document.getElementById("buscaFunc");
  const hiddenId   = document.getElementById("funcionarioId");
  const box        = document.getElementById("suggestions");
  let debounce;

  buscaInput.addEventListener("input", () => {
    clearTimeout(debounce);
    const q = buscaInput.value.trim();
    if (q.length < 2) { box.style.display = "none"; return; }
    debounce = setTimeout(() => {
      fetch("/buscar_funcionarios_nome?q=" + encodeURIComponent(q))
        .then(r => r.json())
        .then(lista => {
          if (!lista.length) { box.style.display = "none"; return; }
          box.innerHTML = lista.map(f =>
            `<div class="suggest-item" data-id="${f.id}" data-nome="${f.nome}"
                 style="padding:9px 14px; cursor:pointer; font-size:13px; border-bottom:1px solid var(--border)">
               <strong>${f.nome}</strong>
               <span style="color:var(--text-muted); font-size:12px"> · ${f.setor || ''} · ${f.matricula || 'sem matríc.'}</span>
             </div>`
          ).join("");
          box.style.display = "block";
        });
    }, 250);
  });

  box.addEventListener("click", e => {
    const item = e.target.closest(".suggest-item");
    if (!item) return;
    hiddenId.value  = item.dataset.id;
    buscaInput.value = item.dataset.nome;
    box.style.display = "none";
  });

  document.addEventListener("click", e => {
    if (!buscaInput.contains(e.target) && !box.contains(e.target)) box.style.display = "none";
  });
</script>
<div th:replace="~{components/footer :: footer}"></div>
</body>
</html>
