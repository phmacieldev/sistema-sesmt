<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${titulo + ' — PGEO'}">Erro — PGEO</title>
    <style>
        body { font-family: Arial; background: #f4f6f9; display: flex;
               align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px 50px; border-radius: 10px;
                box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; max-width: 500px; }
        .status { font-size: 64px; font-weight: bold; color: #e74c3c; margin: 0; }
        h2 { color: #2c3e50; margin: 10px 0; }
        p  { color: #7f8c8d; line-height: 1.6; }
        .btn { display: inline-block; margin-top: 20px; padding: 10px 20px;
               background: #3498db; color: white; text-decoration: none;
               border-radius: 6px; }
        .btn:hover { background: #2c6fd6; }
        .status-403 { color: #e67e22; }
        .status-404 { color: #95a5a6; }
        .status-500 { color: #e74c3c; }
    </style>
</head>
<body>
<div class="card">
    <p class="status"
       th:classappend="${status == 403 ? 'status-403' : status == 404 ? 'status-404' : 'status-500'}"
       th:text="${status}">500</p>
    <h2 th:text="${titulo}">Erro</h2>
    <p th:text="${mensagem}">Ocorreu um erro inesperado.</p>
    <a th:href="@{/dashboard}" class="btn">← Voltar ao Dashboard</a>
</div>
</body>
</html>
