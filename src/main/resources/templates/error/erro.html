<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="${titulo + ' — PGEO'}">Erro — PGEO</title>
  <link rel="stylesheet" th:href="@{/css/global.css}">
  <script th:src="@{/js/theme.js}"></script>
</head>
<body class="no-navbar">

<div class="error-card">
  <div class="error-code"
       th:class="${status == 403 ? 'error-code error-403' :
                  status == 404 ? 'error-code error-404' : 'error-code error-500'}"
       th:text="${status}">500</div>
  <div class="error-title" th:text="${titulo}">Erro</div>
  <p class="error-msg" th:text="${mensagem}">Ocorreu um erro inesperado.</p>
  <a th:href="@{/dashboard}" class="btn btn-primary mt-24">← Voltar ao Dashboard</a>
</div>

</body>
</html>
