<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agenda de Exames — PGEO</title>
  <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
  <link rel="stylesheet" th:href="@{/css/global.css}">
  <link rel="stylesheet" th:href="@{/css/agenda.css}">
  <script th:src="@{/js/theme.js}"></script>
  <script th:src="@{/webjars/fullcalendar/6.1.8/index.global.min.js}"></script>
</head>
<body>
<div th:replace="~{components/navbar :: navbar}"></div>

<div class="page-wrapper-wide">
  <div class="page-header">
    <div class="page-title">📅 Agenda de Exames Ocupacionais</div>
    <div class="ml-auto">
      <button type="button" class="btn btn-success btn-sm" data-modal-novo>➕ Novo Agendamento</button>
    </div>
  </div>

  <div id="calendar"></div>
</div>

<!-- Modal de detalhes -->
<div th:replace="~{components/modal_agendamento :: modal}"></div>

<script th:src="@{/js/agenda.js}"></script>
<script th:src="@{/webjars/sockjs-client/sockjs.min.js}"></script>
<script th:src="@{/webjars/stomp-websocket/stomp.min.js}"></script>
<script th:attr="nonce=${cspNonce}">
  function carregarDados() {
    if (window.pgeoCalendar) window.pgeoCalendar.refetchEvents();
  }
</script>
<script th:src="@{/js/websocket.js}"></script>
<div th:replace="~{components/footer :: footer}"></div>
</body>
</html>
