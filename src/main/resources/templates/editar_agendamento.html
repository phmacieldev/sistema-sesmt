<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Editar Agendamento — PGEO</title>
  <link rel="stylesheet" th:href="@{/css/global.css}">
  <link rel="stylesheet" th:href="@{/webjars/flatpickr/dist/flatpickr.min.css}">
  <script th:src="@{/js/theme.js}"></script>
</head>
<body>
<div th:replace="~{components/navbar :: navbar}"></div>

<div class="page-wrapper pw-580">

  <div class="page-header">
    <a th:href="${origem == 'dashboard' ? '/dashboard' : '/agenda'}"
       class="btn btn-secondary btn-sm">← Voltar</a>
    <div class="page-title">✏️ Editar Agendamento</div>
  </div>

  <div class="card">
    <form th:action="@{/editar_agendamento/{id}(id=${agendamento.id})}" method="POST">

      <input type="hidden" name="origem" th:value="${origem}">

      <div class="form-group">
        <label class="form-label">Nome</label>
        <input type="text" name="nome" class="form-control"
               th:value="${agendamento.funcionarioNome}" required>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Setor</label>
          <input type="text" name="setor" class="form-control"
                 th:value="${agendamento.funcionarioSetor}" required>
        </div>
        <div class="form-group">
          <label class="form-label">Função</label>
          <input type="text" name="funcao" class="form-control"
                 th:value="${agendamento.funcionarioFuncao}" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Tipo de Exame</label>
        <select name="tipo_exame" class="form-control" required>
          <option th:each="tipo : ${T(com.sesmt.pgeo.model.enums.TipoExame).values()}"
                  th:value="${tipo.descricao}"
                  th:text="${tipo.descricao}"
                  th:selected="${tipo == agendamento.tipoExame}">
          </option>
        </select>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">
            Data Exame de Sangue
            <small>(opcional para alguns cargos)</small>
          </label>
          <input type="text" name="data_sangue" id="data_sangue" class="form-control"
                 th:value="${agendamento.dataSangue}" placeholder="Selecione a data">
        </div>
        <div class="form-group">
          <label class="form-label">Data Exame Clínico</label>
          <input type="text" name="data_clinico" id="data_clinico" class="form-control"
                 th:value="${agendamento.dataClinico}" required placeholder="Selecione a data">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Horário</label>
        <select name="hora" class="form-control" required>
          <option th:each="h : ${horarios}"
                  th:value="${h}"
                  th:text="${h}"
                  th:selected="${h == agendamento.horaClinico}">
          </option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">
          Observações
          <small>(opcional)</small>
        </label>
        <textarea name="observacoes" class="form-control"
                  th:text="${agendamento.observacoes}"></textarea>
      </div>

      <button type="submit" class="btn btn-success btn-block btn-lg">Salvar Alterações</button>

    </form>
  </div>
</div>

<script th:src="@{/webjars/flatpickr/dist/flatpickr.min.js}"></script>
<script th:attr="nonce=${cspNonce}">
  flatpickr("#data_sangue", {
    dateFormat: "Y-m-d", altInput: true, altFormat: "d/m/Y",
    disable: [d => d.getDay() === 0 || d.getDay() === 6]
  });
  flatpickr("#data_clinico", {
    dateFormat: "Y-m-d", altInput: true, altFormat: "d/m/Y",
    disable: [d => d.getDay() === 0 || d.getDay() === 6]
  });
</script>
</body>
</html>
