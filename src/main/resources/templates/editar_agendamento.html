<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Editar Agendamento — PGEO</title>
  <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
  <link rel="stylesheet" th:href="@{/css/global.css}">
  <script th:src="@{/js/theme.js}"></script>
</head>
<body>
<div th:replace="~{components/navbar :: navbar}"></div>

<div class="page-wrapper pw-580">

  <div class="page-header">
    <a th:href="${origem == 'agenda'} ? @{/agenda} : @{/dashboard}" class="btn btn-secondary btn-sm">← Voltar</a>
    <div class="page-title">✏️ Editar Agendamento</div>
  </div>

  <div class="card">
    <form th:action="@{/editar_agendamento/{id}(id=${agendamento.id})}" method="POST">

      <input type="hidden" name="origem" th:value="${origem}">

      <div class="form-group">
        <label class="form-label">Nome</label>
        <input type="text" name="nome" class="form-control"
               th:value="${agendamento.funcionarioNome}" required>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Setor</label>
          <input type="text" name="setor" class="form-control"
                 th:value="${agendamento.funcionarioSetor}">
        </div>
        <div class="form-group">
          <label class="form-label">Função</label>
          <input type="text" name="funcao" class="form-control"
                 th:value="${agendamento.funcionarioFuncao}">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Tipo de Exame</label>
        <select name="tipo_exame" class="form-control" required>
          <option th:each="tipo : ${tiposExame}"
                  th:value="${tipo.descricao}"
                  th:text="${tipo.descricao}"
                  th:selected="${tipo == agendamento.tipoExame}">
          </option>
        </select>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Data Exame de Sangue <small>(opcional)</small></label>
          <!-- th:value com LocalDate já renderiza yyyy-MM-dd, formato exato do type="date" -->
          <input type="date" name="data_sangue" class="form-control"
                 th:value="${agendamento.dataSangue}">
        </div>
        <div class="form-group">
          <label class="form-label">Data Exame Clínico</label>
          <input type="date" name="data_clinico" class="form-control" required
                 th:value="${agendamento.dataClinico}">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Horário</label>
        <select name="hora" class="form-control" required>
          <option th:each="h : ${horarios}"
                  th:value="${h}"
                  th:text="${h}"
                  th:selected="${h == agendamento.horaClinico}">
          </option>
        </select>
      </div>

      <div class="form-group" th:if="${agendamento.dataSangue != null}">
        <label class="form-label">
          Exames de sangue solicitados
          <small>(opcional — ex: Hemograma, Glicemia, TGO, TGP)</small>
        </label>
        <textarea name="exames_sangue" class="form-control" rows="2"
                  placeholder="Ex: Hemograma completo, Glicemia, TGO, TGP, Creatinina"
                  th:text="${agendamento.examesSangue}"></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">Observações <small>(opcional)</small></label>
        <textarea name="observacoes" class="form-control"
                  th:text="${agendamento.observacoes}"></textarea>
      </div>

      <button type="submit" class="btn btn-success btn-block btn-lg">Salvar Alterações</button>
      <a th:href="${origem == 'agenda'} ? @{/agenda} : @{/dashboard}"
         class="btn btn-secondary btn-block btn-lg mt-8">Cancelar</a>

    </form>
  </div>
</div>

<script th:attr="nonce=${cspNonce}">
  // Validar fim de semana nas datas
  function isWeekend(v) {
    if (!v) return false;
    var d = new Date(v + "T12:00:00");
    return d.getDay() === 0 || d.getDay() === 6;
  }
  ["data_sangue","data_clinico"].forEach(function(id) {
    var el = document.querySelector("[name='" + id + "']");
    if (!el) return;
    el.addEventListener("change", function() {
      if (isWeekend(this.value)) {
        window.showToast && window.showToast("Não é permitido agendar em fim de semana.", "danger");
        this.value = "";
      }
    });
  });
</script>
<div th:replace="~{components/footer :: footer}"></div>
</body>
</html>
