<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard — PGEO</title>
  <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
  <link rel="stylesheet" th:href="@{/css/global.css}">
  <script th:src="@{/js/theme.js}"></script>
</head>
<body>
<div th:replace="~{components/navbar :: navbar}"></div>

<!-- Modal confirmação ASO -->
<div id="modalConfirmacao" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-title">Confirmar Alteração</div>
    <p class="modal-body" id="modalMensagem">Deseja realmente atualizar a data do ASO?</p>
    <div class="modal-footer">
      <button id="btnConfirmarModal" class="btn btn-success">Confirmar</button>
      <button id="btnCancelarModal" class="btn btn-secondary">Cancelar</button>
    </div>
  </div>
</div>

<!-- Modal Guias da Semana -->
<div id="modalGuiasSemana" class="modal-overlay">
  <div class="modal-box" style="max-width:680px;max-height:90vh;overflow-y:auto;">
    <div class="modal-title" id="guias-titulo">📧 Guias da Semana</div>

    <!-- Sangue -->
    <div style="margin-bottom:20px;">
      <div style="font-size:13px;font-weight:700;margin-bottom:8px;">
        🩸 Exames de Sangue
        <span id="guias-sangue-count" style="font-size:12px;font-weight:400;color:var(--text-muted);margin-left:6px;"></span>
      </div>
      <div id="guias-sangue-lista" style="border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:10px;"></div>
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
        <span style="font-size:12px;color:var(--text-muted);">📨 laboratório</span>
        <button class="btn btn-primary btn-sm" id="btn-enviar-sangue">📧 Enviar Guias de Sangue</button>
      </div>
      <div id="guias-sangue-fb" style="display:none;margin-top:8px;padding:8px 12px;background:var(--success-light);color:#166534;border-radius:var(--radius-sm);font-size:13px;"></div>
    </div>

    <hr style="border:none;border-top:1px solid var(--border);margin:16px 0;">

    <!-- Clínico -->
    <div style="margin-bottom:20px;">
      <div style="font-size:13px;font-weight:700;margin-bottom:8px;">
        💊 Exames Clínicos
        <span id="guias-clinico-count" style="font-size:12px;font-weight:400;color:var(--text-muted);margin-left:6px;"></span>
      </div>
      <div id="guias-clinico-lista" style="border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:10px;"></div>
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
        <span style="font-size:12px;color:var(--text-muted);">📨 clínica</span>
        <button class="btn btn-primary btn-sm" id="btn-enviar-clinico">📧 Enviar Guias Clínicas</button>
      </div>
      <div id="guias-clinico-fb" style="display:none;margin-top:8px;padding:8px 12px;background:var(--success-light);color:#166534;border-radius:var(--radius-sm);font-size:13px;"></div>
    </div>

    <div class="modal-footer" style="padding-top:0;">
      <button class="btn btn-secondary" id="btn-fechar-guias">Fechar</button>
    </div>
  </div>
</div>

<div class="page-wrapper-wide">

  <div class="page-header">
    <div>
      <div class="page-title">📋 Agendamentos</div>
    </div>
    <div class="header-actions">
      <button type="button" class="btn btn-secondary" id="btn-guias-semana">📧 Guias da Semana</button>
      <button type="button" class="btn btn-success" data-modal-novo>➕ Novo Agendamento</button>
      <a th:href="@{/agenda}"  class="btn btn-secondary">📅 Agenda</a>
    </div>
  </div>

  <div th:if="${mensagem}" class="alert alert-success" th:text="${mensagem}"></div>
  <div th:if="${erro}"     class="alert alert-danger"  th:text="${erro}"></div>

  <!-- Filtros -->
  <div class="filters-bar">
    <input type="text" id="busca" class="form-control min-w-180"
           placeholder="🔍 Funcionário" th:value="${busca}">
    <input type="date" id="data_inicio" class="form-control min-w-140" th:value="${dataInicio}">
    <input type="date" id="data_fim"    class="form-control min-w-140" th:value="${dataFim}">

    <select id="estabelecimento" class="form-control min-w-120">
      <option value="todos">Todos</option>
      <option value="HEAA" th:selected="${estabelecimento == 'HEAA'}">HEAA</option>
      <option value="FMC"  th:selected="${estabelecimento == 'FMC'}">FMC</option>
      <option value="CSEC" th:selected="${estabelecimento == 'CSEC'}">CSEC</option>
    </select>

    <div class="filter-row">
      <button type="button" id="prevMes" class="btn btn-secondary btn-sm">◀</button>
      <select id="mesSelect" class="form-control min-w-68">
        <option value="1">Jan</option>  <option value="2">Fev</option>
        <option value="3">Mar</option>  <option value="4">Abr</option>
        <option value="5">Mai</option>  <option value="6">Jun</option>
        <option value="7">Jul</option>  <option value="8">Ago</option>
        <option value="9">Set</option>  <option value="10">Out</option>
        <option value="11">Nov</option> <option value="12">Dez</option>
      </select>
      <select id="anoSelect" class="form-control min-w-76">
        <option th:each="ano : ${anos}" th:value="${ano}" th:text="${ano}"></option>
      </select>
      <button type="button" id="nextMes" class="btn btn-secondary btn-sm">▶</button>
    </div>

    <button type="button" id="btn-filtrar" class="btn btn-primary btn-sm">Filtrar</button>
    <button type="button" id="btn-exportar" class="btn btn-secondary btn-sm" title="Exportar para Excel">⬇ Excel</button>
    <a th:href="@{/dashboard}" class="btn btn-ghost btn-sm">Limpar</a>
  </div>

  <!-- Tabela -->
  <div class="card p-0">
    <div class="table-wrapper">
      <table id="tabelaAgendamentos">
        <thead>
          <tr>
            <th>Nome / ASO</th><th>Setor</th><th>Função</th><th>Exame</th>
            <th>Proteus</th><th>Hora</th><th>Sangue</th>
            <th class="col-center" title="ASO enviado">Env.</th>
            <th class="col-center" title="ASO recebido">Rec.</th>
            <th class="col-center" title="Guia de sangue enviada">🩸</th>
            <th class="col-center" title="Guia clínica enviada">💊</th>
            <th class="col-center">Ações</th>
          </tr>
        </thead>
        <tbody id="corpoTabela"></tbody>
      </table>
    </div>
  </div>

  <div id="paginacao" class="pagination-bar"></div>

</div>

<script th:attr="nonce=${cspNonce}">
  const mesSelect = document.getElementById("mesSelect");
  const anoSelect = document.getElementById("anoSelect");
  const hoje = new Date();
  if ([...anoSelect.options].some(o => o.value == hoje.getFullYear())) {
    anoSelect.value = hoje.getFullYear();
  }
  mesSelect.value = hoje.getMonth() + 1;

  function carregarDados(pagina = 0) {
    const params = new URLSearchParams({
      mes: mesSelect.value, ano: anoSelect.value,
      busca: document.getElementById("busca").value,
      data_inicio: document.getElementById("data_inicio").value,
      data_fim: document.getElementById("data_fim").value,
      estabelecimento: document.getElementById("estabelecimento").value,
      aplicar_filtro: "true",
      pagina
    });
    fetch(`/dashboard_dados?${params}`)
      .then(res => res.text())
      .then(html => {
        const tbody = document.getElementById("corpoTabela");
        tbody.innerHTML = html;
        tbody.classList.remove("d-none");
        const meta = document.querySelector("#corpoTabela .pg-meta");
        criarPaginacao(
          meta ? +meta.dataset.totalPaginas : 1,
          meta ? +meta.dataset.paginaAtual  : 0
        );
      });
  }

  mesSelect.addEventListener("change", () => carregarDados());
  anoSelect.addEventListener("change", () => carregarDados());
  document.getElementById("busca").addEventListener("input", () => carregarDados());
  document.getElementById("data_inicio").addEventListener("change", () => carregarDados());
  document.getElementById("data_fim").addEventListener("change", () => carregarDados());
  document.getElementById("estabelecimento").addEventListener("change", () => carregarDados());
  document.getElementById("btn-filtrar").addEventListener("click", () => carregarDados());

  document.getElementById("btn-exportar").addEventListener("click", () => {
    const params = new URLSearchParams({
      mes: mesSelect.value, ano: anoSelect.value,
      busca: document.getElementById("busca").value,
      data_inicio: document.getElementById("data_inicio").value,
      data_fim: document.getElementById("data_fim").value,
      estabelecimento: document.getElementById("estabelecimento").value,
      aplicar_filtro: "true"
    });
    window.location.href = `/exportar?${params}`;
  });

  function setAno(ano) {
    if (![...anoSelect.options].some(o => o.value == ano)) {
      var opt = document.createElement("option");
      opt.value = ano; opt.textContent = ano;
      // Insere na posição correta (ordem decrescente)
      var inserido = false;
      for (var i = 0; i < anoSelect.options.length; i++) {
        if (parseInt(anoSelect.options[i].value) < ano) {
          anoSelect.insertBefore(opt, anoSelect.options[i]);
          inserido = true; break;
        }
      }
      if (!inserido) anoSelect.appendChild(opt);
    }
    anoSelect.value = ano;
  }

  document.getElementById("prevMes").addEventListener("click", () => {
    let mes = parseInt(mesSelect.value), ano = parseInt(anoSelect.value);
    if (--mes < 1) { mes = 12; ano--; }
    mesSelect.value = mes; setAno(ano); carregarDados();
  });
  document.getElementById("nextMes").addEventListener("click", () => {
    let mes = parseInt(mesSelect.value), ano = parseInt(anoSelect.value);
    if (++mes > 12) { mes = 1; ano++; }
    mesSelect.value = mes; setAno(ano); carregarDados();
  });

  document.getElementById('btn-guias-semana').addEventListener('click', abrirModalGuiasSemana);
  document.getElementById('btn-fechar-guias').addEventListener('click', fecharModalGuias);
  document.getElementById('btn-enviar-sangue').addEventListener('click', function() { enviarGuiasSemana('sangue'); });
  document.getElementById('btn-enviar-clinico').addEventListener('click', function() { enviarGuiasSemana('clinico'); });
  document.getElementById('modalGuiasSemana').addEventListener('click', function(e) {
    if (e.target === this) fecharModalGuias();
  });
  document.getElementById('guias-sangue-lista').addEventListener('click', function(e) {
    var btn = e.target.closest('button[data-acao]');
    if (!btn) return;
    var idx  = +btn.dataset.idx;
    var acao = btn.dataset.acao;
    if (acao === 'remover')   removerGuia('sangue', idx);
    if (acao === 'restaurar') restaurarGuia('sangue', idx);
  });
  document.getElementById('guias-clinico-lista').addEventListener('click', function(e) {
    var btn = e.target.closest('button[data-acao]');
    if (!btn) return;
    var idx  = +btn.dataset.idx;
    var acao = btn.dataset.acao;
    if (acao === 'remover')   removerGuia('clinico', idx);
    if (acao === 'restaurar') restaurarGuia('clinico', idx);
  });

  carregarDados();

  function criarPaginacao(totalPaginas, paginaAtual) {
    const div = document.getElementById("paginacao");
    div.innerHTML = "";
    if (totalPaginas <= 1) return;

    function mkBtn(label, page, active, disabled) {
      const b = document.createElement("button");
      b.textContent = label;
      b.className = "btn btn-sm " + (active ? "btn-primary" : "btn-secondary");
      b.disabled = disabled;
      if (!disabled) b.addEventListener("click", () => carregarDados(page));
      return b;
    }
    function mkEllipsis() {
      const s = document.createElement("span");
      s.className = "text-muted"; s.textContent = "…";
      return s;
    }

    div.appendChild(mkBtn("◀", paginaAtual - 1, false, paginaAtual === 0));

    const start = Math.max(0, paginaAtual - 2);
    const end   = Math.min(totalPaginas - 1, paginaAtual + 2);

    if (start > 0) {
      div.appendChild(mkBtn("1", 0, false, false));
      if (start > 1) div.appendChild(mkEllipsis());
    }
    for (let p = start; p <= end; p++) {
      div.appendChild(mkBtn(String(p + 1), p, p === paginaAtual, false));
    }
    if (end < totalPaginas - 1) {
      if (end < totalPaginas - 2) div.appendChild(mkEllipsis());
      div.appendChild(mkBtn(String(totalPaginas), totalPaginas - 1, false, false));
    }

    div.appendChild(mkBtn("▶", paginaAtual + 1, false, paginaAtual === totalPaginas - 1));

    const info = document.createElement("span");
    info.className = "text-muted font-sm";
    info.textContent = `Pág. ${paginaAtual + 1} / ${totalPaginas}`;
    div.appendChild(info);
  }

  // ── Delegação de eventos na tabela (evita onclick= bloqueado por CSP) ──
  document.getElementById('corpoTabela').addEventListener('click', function(e) {
    var btn = e.target.closest('[data-action]');
    if (!btn) return;
    var action = btn.dataset.action;
    if (action === 'open-pop') {
      abrirPopover(btn.dataset.popId);
    } else if (action === 'close-pop') {
      fecharPopover(btn.dataset.popId);
    } else if (action === 'confirm-status') {
      confirmarStatus(btn.dataset.popId, btn.dataset.btnId, +btn.dataset.agId, btn.dataset.campo);
    } else if (action === 'confirm-recebido') {
      confirmarRecebido(btn.dataset.popId, btn.dataset.btnId, +btn.dataset.agId);
    }
  });
  document.getElementById('corpoTabela').addEventListener('submit', function(e) {
    if (e.target.closest('[data-confirm-excluir]')) {
      if (!confirm('Deseja realmente excluir este agendamento?')) e.preventDefault();
    }
  });

  function toggleStatusAso(agId, campo, valor) {
    pgeoPostJson('/atualizar_status_aso', {agendamento_id: agId, campo: campo, valor: valor})
    .then(r => r.json())
    .then(data => {
      if (!data.sucesso) window.showToast && window.showToast("Erro: " + data.erro, 'danger');
    });
  }

  // ── Popover helpers ───────────────────────────────────────────────────
  function abrirPopover(id) {
    document.querySelectorAll('.mini-pop.show').forEach(function(p) {
      if (p.id !== id) p.classList.remove('show');
    });
    document.getElementById(id).classList.toggle('show');
  }
  function fecharPopover(id) {
    document.getElementById(id).classList.remove('show');
  }
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.popover-wrap')) {
      document.querySelectorAll('.mini-pop.show').forEach(function(p) { p.classList.remove('show'); });
    }
  });

  function confirmarStatus(popId, btnId, agId, campo) {
    var btn = document.getElementById(btnId);
    var novoValor = btn.classList.contains('pill-pend');
    fecharPopover(popId);
    toggleStatusAso(agId, campo, novoValor);
    btn.textContent = novoValor ? '✅' : '⏳';
    if (novoValor) { btn.classList.replace('pill-pend', 'pill-ok'); }
    else           { btn.classList.replace('pill-ok',   'pill-pend'); }
  }

  function confirmarRecebido(popId, btnId, agId) {
    var btn = document.getElementById(btnId);
    var novoValor = btn.classList.contains('pill-pend');
    fecharPopover(popId);
    if (novoValor) {
      var modal = document.getElementById("modalConfirmacao");
      document.getElementById("modalMensagem").textContent =
        "Deseja atualizar a data do ASO do funcionário para a data deste exame?";
      modal.classList.add("show");
      document.getElementById("btnConfirmarModal").onclick = function() {
        toggleStatusAso(agId, 'recebido', true);
        btn.textContent = '✅';
        btn.classList.replace('pill-pend', 'pill-ok');
        modal.classList.remove("show");
      };
      document.getElementById("btnCancelarModal").onclick = function() {
        modal.classList.remove("show");
      };
    } else {
      toggleStatusAso(agId, 'recebido', false);
      btn.textContent = '⏳';
      btn.classList.replace('pill-ok', 'pill-pend');
    }
  }

  // ── Modal Guias da Semana ─────────────────────────────────────────────
  var _guiasSangue  = [];
  var _guiasClinico = [];

  function abrirModalGuiasSemana() {
    var modal = document.getElementById('modalGuiasSemana');
    modal.classList.add('show');
    document.getElementById('guias-titulo').textContent = '⏳ Carregando…';
    document.getElementById('guias-sangue-lista').innerHTML  = '';
    document.getElementById('guias-clinico-lista').innerHTML = '';
    fetch('/guias-semana')
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function(data) {
        document.getElementById('guias-titulo').textContent = '📧 Guias da Semana — ' + data.semana;
        _guiasSangue  = data.sangue.map(function(a) { return Object.assign({}, a, {removido: false}); });
        _guiasClinico = data.clinico.map(function(a) { return Object.assign({}, a, {removido: false}); });
        renderGuiasLista('sangue');
        renderGuiasLista('clinico');
      })
      .catch(function(err) {
        document.getElementById('guias-titulo').textContent = '📧 Guias da Semana';
        document.getElementById('guias-sangue-lista').innerHTML  =
          '<div style="padding:16px 14px;font-size:13px;color:var(--danger);">Erro ao carregar guias. Tente novamente.</div>';
        document.getElementById('guias-clinico-lista').innerHTML = '';
        console.error('guias-semana:', err);
      });
  }

  function fecharModalGuias() {
    document.getElementById('modalGuiasSemana').classList.remove('show');
  }

  function renderGuiasLista(tipo) {
    var items = tipo === 'sangue' ? _guiasSangue : _guiasClinico;
    var lista  = document.getElementById('guias-' + tipo + '-lista');
    var count  = document.getElementById('guias-' + tipo + '-count');
    var ativos = items.filter(function(a) { return !a.removido; }).length;
    var extra  = tipo === 'sangue' ? ' · 1 PDF mesclado' : ' · ' + ativos + ' PDF(s)';
    count.textContent = ativos + ' agendamento(s)' + extra;

    if (items.length === 0) {
      lista.innerHTML = '<div style="padding:16px 14px;font-size:13px;color:var(--text-muted);">Nenhum agendamento na próxima semana.</div>';
      return;
    }
    lista.innerHTML = items.map(function(a, i) {
      var style = a.removido ? 'opacity:.35;text-decoration:line-through;' : '';
      var examesSpan = (tipo === 'sangue' && a.exames)
        ? '<span style="font-size:11px;color:var(--text-muted);margin-left:4px;">' + escapeHtml(a.exames) + '</span>' : '';
      var tipoSpan = (tipo === 'clinico' && a.tipo)
        ? '<span style="font-size:11px;background:var(--bg-table-head);padding:1px 6px;border-radius:10px;margin-left:4px;">' + escapeHtml(a.tipo) + '</span>' : '';
      return '<div style="display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border);font-size:13px;' + style + '">'
        + '<span style="min-width:72px;color:var(--text-muted);font-size:12px;">' + escapeHtml(a.data) + '</span>'
        + '<span style="flex:1;font-weight:500;">' + escapeHtml(a.nome) + examesSpan + tipoSpan + '</span>'
        + '<span style="color:var(--text-secondary);font-size:12px;min-width:80px;">' + escapeHtml(a.setor) + '</span>'
        + '<span style="color:var(--text-secondary);font-size:12px;min-width:44px;">' + escapeHtml(a.hora) + '</span>'
        + (a.removido
          ? '<button data-acao="restaurar" data-idx="' + i + '" style="background:none;border:none;color:var(--primary);cursor:pointer;font-size:12px;">desfazer</button>'
          : '<button data-acao="remover"   data-idx="' + i + '" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:16px;line-height:1;">✕</button>')
        + '</div>';
    }).join('');
    // remove last border
    var divs = lista.querySelectorAll('div');
    if (divs.length) divs[divs.length - 1].style.borderBottom = 'none';
  }

  function removerGuia(tipo, idx) {
    if (tipo === 'sangue') _guiasSangue[idx].removido = true;
    else _guiasClinico[idx].removido = true;
    renderGuiasLista(tipo);
  }
  function restaurarGuia(tipo, idx) {
    if (tipo === 'sangue') _guiasSangue[idx].removido = false;
    else _guiasClinico[idx].removido = false;
    renderGuiasLista(tipo);
  }

  function enviarGuiasSemana(tipo) {
    var fb = document.getElementById('guias-' + tipo + '-fb');
    var ativos = (tipo === 'sangue' ? _guiasSangue : _guiasClinico).filter(function(a) { return !a.removido; });
    if (ativos.length === 0) { window.showToast && window.showToast('Nenhuma guia selecionada.', 'warning'); return; }
    fb.textContent = '⏳ Em breve: envio automático por e-mail será implementado. (' + ativos.length + ' guia(s) selecionadas)';
    fb.style.display = 'block';
  }

  function escapeHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>

<script th:src="@{/webjars/sockjs-client/dist/sockjs.min.js}"></script>
<script th:src="@{/webjars/stomp-websocket/lib/stomp.min.js}"></script>
<script th:src="@{/js/websocket.js}"></script>
<div th:replace="~{components/footer :: footer}"></div>
</body>
</html>
