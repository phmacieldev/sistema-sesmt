<!--
    _tabela_agendamentos.html — Fragmento de <tr> retornado via AJAX pelo dashboard.
    O controller retorna "_tabela_agendamentos :: tbody".
-->
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="tbody">
  <!-- Metadados de paginação lidos pelo JavaScript do dashboard -->
  <tr th:if="${totalPaginas != null}" class="pg-meta d-none"
      th:attr="data-total-paginas=${totalPaginas},data-pagina-atual=${paginaAtual},data-total-itens=${totalItens}">
    <td></td>
  </tr>
  <tr th:each="a : ${agendamentos}" th:attr="data-id=${a.id}">
    <td>
      <a th:if="${a.funcionario != null}"
         th:href="@{/funcionario/{id}(id=${a.funcionario.id})}"
         class="link-func"
         th:text="${a.funcionarioNome}">—</a>
      <span th:unless="${a.funcionario != null}"
            th:text="${a.funcionarioNome}">—</span>
      <span th:if="${a.funcionario != null and a.funcionario.aso != null}"
            th:with="hoje=${T(java.time.LocalDate).now()}, aso=${a.funcionario.aso}"
            th:class="${aso.isBefore(hoje) ? 'aso-vencido aso-status' :
                       aso.isBefore(hoje.plusDays(30)) ? 'aso-aviso aso-status' : 'aso-ok aso-status'}"
            th:text="${aso.isBefore(hoje) ? '● Vencido' :
                       aso.isBefore(hoje.plusDays(30)) ? '● A vencer' : '● Em dia'}">
      </span>
      <span th:if="${a.funcionario != null and a.funcionario.aso == null}"
            class="aso-sem">sem ASO</span>
    </td>
    <td th:text="${a.funcionarioSetor}">—</td>
    <td th:text="${a.funcionarioFuncao}">—</td>
    <td><span class="badge-tipo" th:classappend="${a.tipoExame != null ? a.tipoExame.cssClass : ''}" th:text="${a.tipoExameDescricao}">—</span></td>
    <td th:text="${a.dataClinico != null ? #temporals.format(a.dataClinico, 'dd/MM/yyyy') : '—'}">—</td>
    <td th:text="${a.horaClinico}">—</td>
    <td th:text="${a.dataSangue != null ? #temporals.format(a.dataSangue, 'dd/MM/yyyy') : '—'}">—</td>
    <!-- ASO Enviado -->
    <td class="text-center">
      <div class="popover-wrap">
        <button th:id="|btn-env-${a.id}|"
                th:class="${a.asoEnviado} ? 'status-pill pill-ok' : 'status-pill pill-pend'"
                th:attr="onclick=|abrirPopover('pop-env-${a.id}')|"
                th:text="${a.asoEnviado} ? '✅' : '⏳'">⏳</button>
        <div th:id="|pop-env-${a.id}|" class="mini-pop">
          <p th:text="${a.asoEnviado} ? 'Desmarcar envio do ASO?' : 'Marcar ASO como enviado?'">?</p>
          <div class="pop-btns">
            <button class="btn btn-primary btn-sm"
                    th:attr="onclick=|confirmarStatus('pop-env-${a.id}','btn-env-${a.id}',${a.id},'enviado')|">Sim</button>
            <button class="btn btn-ghost btn-sm"
                    th:attr="onclick=|fecharPopover('pop-env-${a.id}')|">✕</button>
          </div>
        </div>
      </div>
    </td>
    <!-- ASO Recebido -->
    <td class="text-center">
      <div class="popover-wrap">
        <button th:id="|btn-rec-${a.id}|"
                th:class="${a.asoRecebido} ? 'status-pill pill-ok' : 'status-pill pill-pend'"
                th:attr="onclick=|abrirPopover('pop-rec-${a.id}')|"
                th:text="${a.asoRecebido} ? '✅' : '⏳'">⏳</button>
        <div th:id="|pop-rec-${a.id}|" class="mini-pop">
          <p th:text="${a.asoRecebido} ? 'Reverter recebimento do ASO?' : 'Confirmar recebimento do ASO?'">?</p>
          <div class="pop-btns">
            <button class="btn btn-primary btn-sm"
                    th:attr="onclick=|confirmarRecebido('pop-rec-${a.id}','btn-rec-${a.id}',${a.id})|">Sim</button>
            <button class="btn btn-ghost btn-sm"
                    th:attr="onclick=|fecharPopover('pop-rec-${a.id}')|">✕</button>
          </div>
        </div>
      </div>
    </td>
    <!-- Guia Sangue -->
    <td class="text-center">
      <div class="popover-wrap">
        <button th:id="|btn-gs-${a.id}|"
                th:class="${a.guiaSangueEnviada} ? 'status-pill pill-ok' : 'status-pill pill-pend'"
                th:attr="onclick=|abrirPopover('pop-gs-${a.id}')|"
                th:text="${a.guiaSangueEnviada} ? '✅' : '⏳'">⏳</button>
        <div th:id="|pop-gs-${a.id}|" class="mini-pop">
          <p th:text="${a.guiaSangueEnviada} ? 'Desmarcar envio da guia de sangue?' : 'Marcar guia de sangue como enviada?'">?</p>
          <div class="pop-btns">
            <button class="btn btn-primary btn-sm"
                    th:attr="onclick=|confirmarStatus('pop-gs-${a.id}','btn-gs-${a.id}',${a.id},'guia_sangue')|">Sim</button>
            <button class="btn btn-ghost btn-sm"
                    th:attr="onclick=|fecharPopover('pop-gs-${a.id}')|">✕</button>
          </div>
        </div>
      </div>
    </td>
    <!-- Guia Clínico -->
    <td class="text-center">
      <div class="popover-wrap">
        <button th:id="|btn-gc-${a.id}|"
                th:class="${a.guiaClinicoEnviada} ? 'status-pill pill-ok' : 'status-pill pill-pend'"
                th:attr="onclick=|abrirPopover('pop-gc-${a.id}')|"
                th:text="${a.guiaClinicoEnviada} ? '✅' : '⏳'">⏳</button>
        <div th:id="|pop-gc-${a.id}|" class="mini-pop">
          <p th:text="${a.guiaClinicoEnviada} ? 'Desmarcar envio da guia clínica?' : 'Marcar guia clínica como enviada?'">?</p>
          <div class="pop-btns">
            <button class="btn btn-primary btn-sm"
                    th:attr="onclick=|confirmarStatus('pop-gc-${a.id}','btn-gc-${a.id}',${a.id},'guia_clinico')|">Sim</button>
            <button class="btn btn-ghost btn-sm"
                    th:attr="onclick=|fecharPopover('pop-gc-${a.id}')|">✕</button>
          </div>
        </div>
      </div>
    </td>
    <td>
      <div class="actions-cell">
        <a th:href="@{/guia/sangue/{id}(id=${a.id})}"
           class="btn btn-secondary btn-icon btn-sm" title="Guia de Sangue" target="_blank">🩸</a>
        <a th:href="@{/guia/clinico/{id}(id=${a.id})}"
           class="btn btn-secondary btn-icon btn-sm" title="Guia Clínico Proteus" target="_blank">📋</a>
        <button type="button" class="btn btn-primary btn-icon btn-sm" title="Editar"
                data-modal-editar th:attr="data-id=${a.id}">✏️</button>
        <form th:action="@{/excluir_agendamento/{id}(id=${a.id})}"
              method="POST" onsubmit="return confirmarExclusao()">
          <button class="btn btn-danger btn-icon btn-sm" title="Excluir">🗑</button>
        </form>
      </div>
    </td>
  </tr>
  <tr th:if="${#lists.isEmpty(agendamentos)}">
    <td colspan="12">
      <div class="empty-state">
        <div class="empty-state-icon">📭</div>
        <div class="empty-state-title">Nenhum agendamento encontrado</div>
      </div>
    </td>
  </tr>
</th:block>
</body>
</html>
