<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Indicadores de Atestados — PGEO</title>
  <link rel="stylesheet" th:href="@{/css/global.css}">
  <script th:src="@{/js/theme.js}"></script>
</head>
<body>
<div th:replace="~{components/navbar :: navbar}"></div>

<div class="page-wrapper">

  <div class="page-header">
    <div>
      <div class="page-title">📋 Indicadores de Atestados</div>
      <div class="page-subtitle">Funcionários com maior afastamento nos últimos 60 dias</div>
    </div>
  </div>

  <div class="card" style="padding:0;">
    <div class="table-wrapper" style="border:none;">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Funcionário</th>
            <th>Total de Dias</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="entry, stat : ${resultados}">
            <td style="color:var(--text-muted);font-weight:600;"
                th:text="${stat.index + 1}">1</td>
            <td th:text="${entry.key}">Nome</td>
            <td>
              <span class="badge"
                    th:class="${entry.value >= 15 ? 'badge badge-danger' :
                               entry.value >= 7  ? 'badge badge-warning' : 'badge badge-gray'}"
                    th:text="${entry.value + ' dias'}">0</span>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(resultados)}">
            <td colspan="3">
              <div class="empty-state">
                <div class="empty-state-icon">✅</div>
                <div class="empty-state-title">Nenhum atestado nos últimos 60 dias</div>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>
</body>
</html>
