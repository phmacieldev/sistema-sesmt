<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Indicadores de Atestados — PGEO</title>
    <style>
        body { font-family: Arial; background: #f4f6f9; margin: 20px; }
        .nav { text-align: center; margin-bottom: 20px; }
        .nav a { margin: 5px; padding: 10px 15px; background: #3498db; color: white;
                 text-decoration: none; border-radius: 5px; }
        h2 { text-align: center; }
        table { width: 100%; background: white; border-collapse: collapse; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: center; }
        th { background: #e74c3c; color: white; }
        tr:nth-child(even) { background: #f9f9f9; }
    </style>
</head>
<body>
<div class="nav">
    <a th:href="@{/dashboard}">Dashboard</a>
</div>

<h2>Indicadores de Atestados — Últimos 60 dias</h2>

<table>
    <thead>
        <tr>
            <th>#</th>
            <th>Funcionário</th>
            <th>Total de Dias</th>
        </tr>
    </thead>
    <tbody>
        <!--
            No Python, resultados era uma lista de tuplas (nome, setor, total_dias).
            No Java, o controller monta um Map<String, Integer> e passa como entrySet.

            Thymeleaf: th:each="entry : ${resultados}"
            entry.key   = nome do funcionário
            entry.value = total de dias
        -->
        <tr th:each="entry, stat : ${resultados}">
            <td th:text="${stat.index + 1}">1</td>
            <td th:text="${entry.key}">Nome</td>
            <td th:text="${entry.value}">0</td>
        </tr>
        <tr th:if="${#lists.isEmpty(resultados)}">
            <td colspan="3" style="color:#999;padding:20px;">Nenhum atestado registrado nos últimos 60 dias.</td>
        </tr>
    </tbody>
</table>
</body>
</html>
