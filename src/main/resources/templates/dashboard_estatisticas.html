<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Estatísticas — PGEO</title>
  <link rel="stylesheet" th:href="@{/css/global.css}">
  <script th:src="@{/js/theme.js}"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div th:replace="~{components/navbar :: navbar}"></div>

<div class="page-wrapper">

  <div class="page-header">
    <div>
      <div class="page-title">📈 Estatísticas de Exames</div>
    </div>
    <form th:action="@{/dashboard_estatisticas}" method="GET"
          style="display:flex;gap:8px;align-items:center;margin-left:auto;">
      <select name="ano" class="form-control" style="min-width:90px;">
        <option value="">Todos</option>
        <option th:each="a : ${anosDisponiveis}"
                th:value="${a}" th:text="${a}"
                th:selected="${anoFiltro != null and anoFiltro == a}"></option>
      </select>
      <button type="submit" class="btn btn-primary btn-sm">Filtrar</button>
    </form>
  </div>

  <!-- Cards de totais por tipo -->
  <div class="grid-3" style="margin-bottom:24px;">
    <div th:each="entry : ${contadorTipoExame.entrySet()}" class="stat-card">
      <span class="stat-icon">📋</span>
      <div>
        <div class="stat-label" th:text="${entry.key}">Tipo</div>
        <div class="stat-value" th:text="${entry.value}">0</div>
      </div>
    </div>
  </div>

  <!-- Gráficos -->
  <div class="grid-2">
    <div class="card">
      <div class="card-header">
        <span class="card-title">📊 Exames por Mês</span>
      </div>
      <canvas id="graficoMes"></canvas>
    </div>
    <div class="card">
      <div class="card-header">
        <span class="card-title">🍩 Distribuição por Tipo</span>
      </div>
      <canvas id="graficoPizza"></canvas>
    </div>
  </div>

</div>

<script th:inline="javascript">
var meses        = /*[[${meses}]]*/ [];
var examesPorMes = /*[[${contadorExamesMes}]]*/ [];
var tiposExame   = /*[[${tiposExame}]]*/ [];
var tiposTotais  = /*[[${contadorTipoExame.values()}]]*/ [];

function isDark() {
  return document.documentElement.getAttribute('data-theme') === 'dark';
}

function textColor() { return isDark() ? '#94a3b8' : '#64748b'; }
function gridColor()  { return isDark() ? '#334155' : '#e2e8f0'; }

var barChart, pieChart;

function buildCharts() {
  const dark = isDark();
  const tc = textColor(), gc = gridColor();

  if (barChart) barChart.destroy();
  if (pieChart) pieChart.destroy();

  barChart = new Chart(document.getElementById("graficoMes"), {
    type: "bar",
    data: {
      labels: meses,
      datasets: [{
        label: "Exames",
        data: examesPorMes,
        backgroundColor: "#3b82f6",
        borderRadius: 6
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: gc }, ticks: { color: tc } },
        y: { grid: { color: gc }, ticks: { color: tc } }
      }
    }
  });

  pieChart = new Chart(document.getElementById("graficoPizza"), {
    type: "doughnut",
    data: {
      labels: Object.keys(/*[[${contadorTipoExame}]]*/ {}),
      datasets: [{
        data: Object.values(/*[[${contadorTipoExame}]]*/ {}),
        backgroundColor: ["#3b82f6","#10b981","#f59e0b","#ef4444","#8b5cf6","#06b6d4"]
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: tc } } }
    }
  });
}

document.addEventListener('DOMContentLoaded', buildCharts);

const observer = new MutationObserver(() => buildCharts());
observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
</script>
</body>
</html>
