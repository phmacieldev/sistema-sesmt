<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="navbar" class="navbar">

  <!-- Brand -->
  <a th:href="@{/dashboard}" class="navbar-brand" style="text-decoration:none">
    <span class="brand-icon">🏥</span>
    <span class="brand-name">PGEO <small>SESMT</small></span>
  </a>

  <!-- Links principais -->
  <div class="navbar-links" id="navLinks">
    <a th:href="@{/agenda}"                 class="nav-link">📅 Agenda</a>
    <a th:href="@{/agendar}"                class="nav-link">➕ Agendar</a>
    <a th:href="@{/dashboard}"              class="nav-link">📊 Dashboard</a>
    <a th:href="@{/dashboard_exames}"       class="nav-link">💊 Exames</a>
    <a th:href="@{/dashboard_estatisticas}" class="nav-link">📈 Estatísticas</a>
    <a th:href="@{/dashboard_sangue}"       class="nav-link">🩸 Sangue</a>
    <a th:href="@{/indicadores}"            class="nav-link">📋 Indicadores</a>
    <a sec:authorize="hasRole('ADMIN')"
       th:href="@{/admin/usuarios}"         class="nav-link">⚙️ Admin</a>
    <a sec:authorize="hasRole('ADMIN')"
       th:href="@{/admin/auditoria}"        class="nav-link">🔍 Auditoria</a>
  </div>

  <!-- Toggle mobile -->
  <button class="navbar-toggle" id="navToggle" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>

  <!-- Lado direito -->
  <div class="navbar-right">
    <button class="btn-theme" id="themeBtn" title="Alternar tema">🌙</button>
    <div class="user-info">
      <div class="user-avatar" sec:authentication="name" th:text="${#strings.substring(#authentication.name, 0, 1).toUpperCase()}">U</div>
      <span class="user-name" sec:authentication="name">usuário</span>
    </div>
    <a th:href="@{/minha-senha}" class="btn-ghost btn btn-sm" title="Alterar senha">🔑</a>
    <form th:action="@{/logout}" method="post" style="margin:0">
      <button type="submit" class="btn-logout">Sair</button>
    </form>
  </div>

</nav>
</body>
</html>
