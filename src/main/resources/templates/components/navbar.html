<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="navbar" class="navbar">

  <!-- Brand -->
  <div class="navbar-brand">
    <span class="brand-icon">🏥</span>
    <span class="brand-name">PGEO <small>SESMT</small></span>
  </div>

  <!-- Links principais -->
  <div class="navbar-links" id="navLinks">
    <a th:href="@{/home}"                    class="nav-link" th:classappend="${currentUri == '/home'} ? ' active' : ''">🏠 Início</a>
    <a th:href="@{/agendar}"                 class="nav-link" th:classappend="${currentUri == '/agendar'} ? ' active' : ''">➕ Agendar</a>
    <a th:href="@{/dashboard}"               class="nav-link" th:classappend="${currentUri == '/dashboard'} ? ' active' : ''">📊 Agendamentos</a>
    <a th:href="@{/agenda}"                  class="nav-link" th:classappend="${currentUri == '/agenda'} ? ' active' : ''">📅 Agenda</a>
    <a th:href="@{/dashboard_sangue}"        class="nav-link" th:classappend="${currentUri == '/dashboard_sangue'} ? ' active' : ''">🩸 Sangue</a>
    <a th:href="@{/atestados}"               class="nav-link" th:classappend="${#strings.startsWith(currentUri, '/atestados')} ? ' active' : ''">📄 Atestados</a>
    <a th:href="@{/indicadores}"             class="nav-link" th:classappend="${currentUri == '/indicadores'} ? ' active' : ''">📋 Indicadores de Atestados</a>
    <a th:href="@{/funcionarios}"             class="nav-link" th:classappend="${#strings.startsWith(currentUri, '/funcionario')} ? ' active' : ''">👤 Funcionários</a>
    <a th:href="@{/dashboard_exames}"        class="nav-link" th:classappend="${currentUri == '/dashboard_exames'} ? ' active' : ''">💊 Exames</a>
    <a th:href="@{/dashboard_estatisticas}"  class="nav-link" th:classappend="${currentUri == '/dashboard_estatisticas'} ? ' active' : ''">📈 Estatísticas de Exames</a>
    <a sec:authorize="hasRole('ADMIN')"
       th:href="@{/admin/usuarios}"          class="nav-link" th:classappend="${#strings.startsWith(currentUri, '/admin') and !#strings.startsWith(currentUri, '/admin/auditoria')} ? ' active' : ''">⚙️ Admin</a>
    <a sec:authorize="hasRole('ADMIN')"
       th:href="@{/admin/auditoria}"         class="nav-link" th:classappend="${#strings.startsWith(currentUri, '/admin/auditoria')} ? ' active' : ''">🔍 Auditoria</a>
  </div>

  <!-- Toggle mobile -->
  <button class="navbar-toggle" id="navToggle" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>

  <!-- Lado direito -->
  <div class="navbar-right">
    <button class="btn-theme" id="themeBtn" title="Alternar tema">🌙</button>
    <div class="user-info">
      <div class="user-avatar" sec:authentication="name" th:text="${#strings.substring(#authentication.name, 0, 1).toUpperCase()}">U</div>
      <span class="user-name" sec:authentication="name">usuário</span>
    </div>
    <a th:href="@{/minha-senha}" class="btn-ghost btn btn-sm" title="Alterar senha">🔑</a>
    <form th:action="@{/logout}" method="post" style="margin:0">
      <button type="submit" class="btn-logout">Sair</button>
    </form>
  </div>

</nav>
</body>
</html>
