<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="footer">

  <footer style="margin-top:auto;padding:14px 24px 10px;text-align:center;font-size:11px;color:var(--text-muted);border-top:1px solid var(--border);background:var(--bg-card);">
    &copy; 2026 Pedro Henrique Maciel da Silva Faria. Todos os direitos reservados.
    <span style="margin-left:8px;opacity:.6;">Versão 1.0 &mdash; Enterprise Internal</span>
  </footer>

  <!-- ── Modal global de agendamento (novo / editar) ── -->
  <div id="modal-form-ag" class="modal-overlay">
    <div class="modal-box" style="max-width:560px;max-height:90vh;overflow-y:auto;">
      <div class="modal-header-row">
        <div class="modal-title mb-0" id="mf-titulo">Novo Agendamento</div>
        <button type="button" onclick="fecharModalForm()" class="btn btn-ghost btn-icon btn-sm btn-close">✕</button>
      </div>

      <form id="mf-form" novalidate>
        <input type="hidden" id="mf-id" name="_agId" value="">

        <div class="form-group">
          <label class="form-label" for="mf-tipo">Tipo de exame</label>
          <select id="mf-tipo" name="tipo_exame" class="form-control">
            <option value="">Selecione</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="mf-matricula">Matrícula</label>
          <div class="autocomplete-wrapper">
            <input type="text" id="mf-matricula" name="matricula" class="form-control"
                   autocomplete="off" placeholder="Matrícula (opcional para admissional)">
            <div id="mf-sugestoes-matricula" class="suggestions"></div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="mf-nome">Nome</label>
          <div class="autocomplete-wrapper">
            <input id="mf-nome" name="nome" class="form-control" autocomplete="off"
                   placeholder="Nome do funcionário">
            <div id="mf-sugestoes" class="suggestions"></div>
          </div>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label class="form-label" for="mf-setor">Setor</label>
            <input id="mf-setor" name="setor" class="form-control" placeholder="Setor">
          </div>
          <div class="form-group">
            <label class="form-label" for="mf-funcao">Função</label>
            <input id="mf-funcao" name="funcao" class="form-control" placeholder="Função">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="mf-sangue">Data exame de sangue <small>(opcional)</small></label>
          <input type="date" id="mf-sangue" name="data_sangue" class="form-control">
          <div id="mf-aviso-sangue" class="alert alert-warning d-none mt-6">
            ⚠ Limite de 5 exames de sangue atingido nesta data. Escolha outra data.
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="mf-clinico">Data exame clínico</label>
          <input type="date" id="mf-clinico" name="data_clinico" class="form-control">
        </div>

        <div class="form-group">
          <label class="form-label" for="mf-hora">Horário</label>
          <select id="mf-hora" name="hora" class="form-control">
            <option value="">Selecione</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">Observações <small>(opcional)</small></label>
          <textarea id="mf-obs" name="observacoes" class="form-control"
                    placeholder="Ex: Funcionária gestante. Solicitar audiometria adicional."></textarea>
        </div>

        <div class="modal-footer mt-20" style="gap:8px;">
          <button type="submit" id="mf-btn-salvar" class="btn btn-success btn-sm">Agendar</button>
          <button type="button" class="btn btn-secondary btn-sm" onclick="fecharModalForm()">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal de confirmação do agendamento -->
  <div id="mf-modal-confirm" class="modal-overlay" style="z-index:1100;">
    <div class="modal-box">
      <div class="modal-title">Confirma o agendamento?</div>
      <div class="modal-body pre-line line-h-17" id="mf-confirm-text"></div>
      <div class="modal-footer">
        <button id="mf-btn-confirm" class="btn btn-success">Confirmar</button>
        <button class="btn btn-secondary"
                onclick="document.getElementById('mf-modal-confirm').classList.remove('show')">Cancelar</button>
      </div>
    </div>
  </div>

  <script th:src="@{/js/modal-agendamento.js}"></script>

</th:block>
</body>
</html>
