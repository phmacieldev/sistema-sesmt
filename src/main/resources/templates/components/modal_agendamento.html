<!--
    Modal de detalhes do agendamento — aberto ao clicar num evento do FullCalendar.
    Thymeleaf: <div th:replace="~{components/modal_agendamento :: modal}"></div>
-->
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="modal" id="modal-agendamento" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-header-row">
      <div class="modal-title mb-0">Detalhes do Agendamento</div>
      <button onclick="fecharModal()" class="btn btn-ghost btn-icon btn-sm btn-close">✕</button>
    </div>

    <div class="info-row">
      <span class="info-label">Nome</span>
      <span class="info-val" id="modal-nome">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">Setor</span>
      <span class="info-val" id="modal-setor">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">Função</span>
      <span class="info-val" id="modal-funcao">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">Exame</span>
      <span class="info-val" id="modal-exame">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">Data</span>
      <span class="info-val" id="modal-data">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">Hora</span>
      <span class="info-val" id="modal-hora">—</span>
    </div>

    <div class="modal-footer mt-20">
      <a id="btn-editar-modal" href="#" class="btn btn-primary btn-sm">✏️ Editar</a>
      <a id="btn-detalhe-modal" href="#" class="btn btn-secondary btn-sm">📋 Detalhes</a>
      <button class="btn btn-secondary btn-sm" onclick="fecharModal()">Fechar</button>
    </div>
  </div>
</div>
</body>
</html>
