<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Vencimentos de ASO — PGEO</title>
    <style>
        body { font-family: Arial; background: #f4f6f9; margin: 20px; }
        .nav { text-align: center; margin-bottom: 20px; }
        .nav a { margin: 5px; padding: 10px 15px; background: #3498db; color: white;
                 text-decoration: none; border-radius: 5px; }
        h2 { text-align: center; }
        table { width: 100%; background: white; border-collapse: collapse; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: center; }
        th { background: #2ecc71; color: white; }
        .vencido    { background: #fde8e8; color: #c0392b; font-weight: bold; }
        .a-vencer   { background: #fff3cd; color: #856404; font-weight: bold; }
        .em-dia     { background: #eafaf1; color: #27ae60; }
        .sem-data   { color: #999; }
    </style>
</head>
<body>
<div class="nav">
    <a th:href="@{/dashboard}">Dashboard</a>
    <a th:href="@{/agendar}">Novo Agendamento</a>
    <a th:href="@{/agenda}">Agenda</a>
</div>

<h2>Vencimentos de ASO</h2>

<table>
    <thead>
        <tr>
            <th>Matrícula</th>
            <th>Nome</th>
            <th>Setor</th>
            <th>Função</th>
            <th>E-mail</th>
            <th>Último ASO</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody>
        <!--
            Jinja2:   {% for f in exames %}
            Thymeleaf: th:each="f : ${exames}"

            No Python, exames era uma lista de dicts:
              {"nome": f.nome, "aso": f.aso, ...}

            Aqui passamos a entidade Funcionario diretamente —
            o Thymeleaf acessa f.nome, f.aso, etc. via getters do Java
        -->
        <tr th:each="f : ${exames}">
            <td th:text="${f.matricula ?: '—'}">—</td>
            <td th:text="${f.nome ?: '—'}">—</td>
            <td th:text="${f.setor ?: '—'}">—</td>
            <td th:text="${f.funcao ?: '—'}">—</td>
            <td th:text="${f.email ?: '—'}">—</td>

            <!--
                #temporals.format() → equivalente ao filtro format_date do Flask:
                  {{ f.vencimento | format_date }}
            -->
            <td th:text="${f.aso != null ? #temporals.format(f.aso, 'dd/MM/yyyy') : '—'}"
                th:class="${f.aso == null ? 'sem-data' : ''}">—</td>

            <!--
                Lógica de status (vencido / a vencer / em dia):
                Equivalente ao que seria feito com um filtro Jinja2.
                Thymeleaf usa expressões inline com operador ternário.

                #dates e #temporals são utilitários do Thymeleaf para datas,
                equivalentes ao datetime do Python.
            -->
            <td th:with="hoje=${T(java.time.LocalDate).now()},
                         limite=${hoje.plusDays(30)}"
                th:class="${f.aso == null ? 'sem-data' :
                            f.aso.isBefore(hoje) ? 'vencido' :
                            f.aso.isBefore(limite) ? 'a-vencer' : 'em-dia'}"
                th:text="${f.aso == null ? '—' :
                           f.aso.isBefore(hoje) ? 'Vencido' :
                           f.aso.isBefore(limite) ? 'A vencer' : 'Em dia'}">
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(exames)}">
            <td colspan="7" style="color:#999;padding:20px;">Nenhum funcionário cadastrado.</td>
        </tr>
    </tbody>
</table>
</body>
</html>
