<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vencimentos de ASO — PGEO</title>
  <link rel="stylesheet" th:href="@{/css/global.css}">
  <script th:src="@{/js/theme.js}"></script>
</head>
<body>
<div th:replace="~{components/navbar :: navbar}"></div>

<div class="page-wrapper">

  <div class="page-header">
    <div>
      <div class="page-title">💊 Vencimentos de ASO</div>
      <div class="page-subtitle">Situação atual dos exames ocupacionais de todos os funcionários</div>
    </div>
  </div>

  <div class="card p-0">
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Matrícula</th>
            <th>Nome</th>
            <th>Setor</th>
            <th>Função</th>
            <th>E-mail</th>
            <th>Último ASO</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="f : ${exames}">
            <td th:text="${f.matricula ?: '—'}">—</td>
            <td>
              <a th:href="@{/funcionario/{id}(id=${f.id})}" class="link-func"
                 th:text="${f.nome ?: '—'}">—</a>
            </td>
            <td th:text="${f.setor ?: '—'}">—</td>
            <td th:text="${f.funcao ?: '—'}">—</td>
            <td th:text="${f.email ?: '—'}">—</td>

            <td th:text="${f.aso != null ? #temporals.format(f.aso, 'dd/MM/yyyy') : '—'}"
                th:class="${f.aso == null ? 'text-muted' : ''}">—</td>

            <td th:with="hoje=${T(java.time.LocalDate).now()},
                         limite=${hoje.plusDays(30)}">
              <span th:if="${f.aso == null}" class="badge badge-gray">Sem ASO</span>
              <span th:if="${f.aso != null and f.aso.isBefore(hoje)}"
                    class="badge badge-danger">Vencido</span>
              <span th:if="${f.aso != null and !f.aso.isBefore(hoje) and f.aso.isBefore(limite)}"
                    class="badge badge-warning">A vencer</span>
              <span th:if="${f.aso != null and !f.aso.isBefore(limite)}"
                    class="badge badge-success">Em dia</span>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(exames)}">
            <td colspan="7">
              <div class="empty-state">
                <div class="empty-state-icon">👤</div>
                <div class="empty-state-title">Nenhum funcionário cadastrado</div>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>
</body>
</html>
