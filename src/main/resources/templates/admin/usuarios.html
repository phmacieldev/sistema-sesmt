<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gestão de Usuários — PGEO</title>
  <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
  <link rel="stylesheet" th:href="@{/css/global.css}">
  <script th:src="@{/js/theme.js}"></script>
</head>
<body>
<div th:replace="~{components/navbar :: navbar}"></div>

<!-- Modal reset senha -->
<div id="modalReset" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-title">Redefinir senha</div>
    <p class="modal-body" id="modalResetInfo"></p>
    <form id="formReset" method="POST">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <div class="form-group">
        <label class="form-label">Nova senha</label>
        <input type="password" name="novaSenha" class="form-control"
               placeholder="Mínimo 8 caracteres" required>
      </div>
      <div class="modal-footer">
        <button type="submit" class="btn btn-warning">Redefinir</button>
        <button type="button" class="btn btn-secondary"
                onclick="document.getElementById('modalReset').classList.remove('show')">
          Cancelar
        </button>
      </div>
    </form>
  </div>
</div>

<div class="page-wrapper">

  <div class="page-header">
    <div>
      <div class="page-title">⚙️ Gestão de Usuários</div>
      <div class="page-subtitle">Crie e gerencie contas de acesso ao sistema</div>
    </div>
  </div>

  <div th:if="${mensagem}" class="alert alert-success" th:text="${mensagem}"></div>
  <div th:if="${erro}"     class="alert alert-danger"  th:text="${erro}"></div>

  <!-- Criar novo usuário -->
  <div class="card mb-16">
    <div class="card-header">
      <span class="card-title">➕ Novo Usuário</span>
    </div>
    <form th:action="@{/admin/usuarios/criar}" method="POST">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Login (username)</label>
          <input type="text" name="username" class="form-control"
                 placeholder="ex: joao.silva" required>
        </div>
        <div class="form-group">
          <label class="form-label">Nome completo</label>
          <input type="text" name="nomeCompleto" class="form-control"
                 placeholder="João da Silva" required>
        </div>
        <div class="form-group">
          <label class="form-label">Senha inicial</label>
          <input type="password" name="senha" class="form-control"
                 placeholder="Mínimo 8 caracteres" required>
        </div>
        <div class="form-group">
          <label class="form-label">Perfil de acesso</label>
          <select name="role" class="form-control" required>
            <option th:each="r : ${roles}" th:value="${r}" th:text="${r.name()}"></option>
          </select>
        </div>
      </div>
      <button type="submit" class="btn btn-success">Criar Usuário</button>
    </form>
  </div>

  <!-- Lista de usuários -->
  <div class="card p-0">
    <div class="card-header">
      <span class="card-title">👥 Usuários cadastrados</span>
    </div>
    <div class="table-wrapper card-inner">
      <table>
        <thead>
          <tr>
            <th>Username</th>
            <th>Nome</th>
            <th>Perfil</th>
            <th>Status</th>
            <th>Último login</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="u : ${usuarios}">
            <td th:text="${u.username}">—</td>
            <td th:text="${u.nomeCompleto ?: '—'}">—</td>
            <td>
              <span class="badge"
                    th:class="${u.role.name() == 'ADMIN' ? 'badge badge-admin' :
                               u.role.name() == 'OPERADOR' ? 'badge badge-op' : 'badge badge-view'}"
                    th:text="${u.role.name()}">—</span>
            </td>
            <td>
              <span class="badge"
                    th:class="${u.ativo ? 'badge badge-success' : 'badge badge-inativo'}"
                    th:text="${u.ativo ? 'Ativo' : 'Inativo'}">—</span>
            </td>
            <td th:text="${u.ultimoLogin != null ?
                #temporals.format(u.ultimoLogin, 'dd/MM/yyyy HH:mm') : 'Nunca'}">—</td>
            <td>
              <div class="d-flex gap-6 flex-wrap items-center">
                <!-- Alterar role -->
                <form th:action="@{/admin/usuarios/{id}/role(id=${u.id})}" method="POST"
                      class="d-flex gap-4 items-center">
                  <select name="role" class="form-control select-sm">
                    <option th:each="r : ${roles}"
                            th:value="${r}"
                            th:text="${r.name()}"
                            th:selected="${r == u.role}"></option>
                  </select>
                  <button type="submit" class="btn btn-warning btn-sm">Salvar</button>
                </form>

                <!-- Ativar/Desativar -->
                <form th:action="@{/admin/usuarios/{id}/status(id=${u.id})}" method="POST">
                  <input type="hidden" name="ativo" th:value="${!u.ativo}">
                  <button type="submit" class="btn btn-sm"
                          th:class="${u.ativo ? 'btn btn-danger btn-sm' : 'btn btn-success btn-sm'}"
                          th:text="${u.ativo ? 'Desativar' : 'Reativar'}">—</button>
                </form>

                <!-- Reset de senha -->
                <button class="btn btn-warning btn-sm"
                        th:data-uid="${u.id}"
                        th:data-uname="${u.username}"
                        onclick="abrirReset(this.dataset.uid, this.dataset.uname)">
                  🔑 Reset
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script th:attr="nonce=${cspNonce}">
function abrirReset(id, username) {
  document.getElementById('modalResetInfo').textContent = 'Redefinindo senha de: ' + username;
  document.getElementById('formReset').action = '/admin/usuarios/' + id + '/reset-senha';
  document.getElementById('modalReset').classList.add('show');
}
window.addEventListener('click', e => {
  const modal = document.getElementById('modalReset');
  if (e.target === modal) modal.classList.remove('show');
});
</script>
<div th:replace="~{components/footer :: footer}"></div>
</body>
</html>
