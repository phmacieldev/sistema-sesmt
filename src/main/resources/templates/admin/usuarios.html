<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Gestão de Usuários — PGEO</title>
    <style>
        body { font-family: Arial; background: #f4f6f9; margin: 20px; }
        h2 { text-align: center; color: #2c3e50; }
        .nav { text-align: center; margin-bottom: 20px; }
        .nav a { margin: 5px; padding: 10px 15px; background: #3498db;
                 color: white; text-decoration: none; border-radius: 5px; }
        .card { background: white; border-radius: 10px; padding: 24px;
                box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 24px; }
        h3 { margin-top: 0; color: #2c3e50; border-bottom: 2px solid #ecf0f1;
             padding-bottom: 8px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid #ecf0f1; }
        th { background: #f8f9fa; font-size: 12px; text-transform: uppercase;
             color: #7f8c8d; letter-spacing: 0.5px; }
        .badge { padding: 3px 10px; border-radius: 12px; font-size: 12px;
                 font-weight: bold; }
        .badge-admin  { background: #fde8e8; color: #c0392b; }
        .badge-op     { background: #e8f4fd; color: #2980b9; }
        .badge-view   { background: #eafaf1; color: #27ae60; }
        .badge-inativo{ background: #f0f0f0; color: #95a5a6; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        label { display: block; font-size: 13px; font-weight: bold;
                color: #555; margin-bottom: 3px; }
        input, select { width: 100%; padding: 8px 10px; border: 1px solid #ddd;
                        border-radius: 6px; font-size: 14px; box-sizing: border-box; }
        .btn { padding: 8px 16px; border: none; border-radius: 6px;
               cursor: pointer; font-weight: bold; font-size: 13px; }
        .btn-primary { background: #2ecc71; color: white; }
        .btn-warning { background: #f39c12; color: white; }
        .btn-danger  { background: #e74c3c; color: white; }
        .btn-sm      { padding: 4px 10px; font-size: 12px; }
        .alerta { padding: 12px; border-radius: 6px; margin-bottom: 16px; }
        .alerta-ok   { background: #eafaf1; color: #27ae60; border: 1px solid #a9dfbf; }
        .alerta-erro { background: #fde8e8; color: #c0392b; border: 1px solid #f5b7b1; }
        .acoes { display: flex; gap: 6px; flex-wrap: wrap; }
        /* Modal */
        .modal { display: none; position: fixed; z-index: 1000; inset: 0;
                 background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 10% auto; padding: 24px;
                         width: 380px; border-radius: 10px; }
        .modal-content h4 { margin-top: 0; }
        .modal-content input { margin-bottom: 12px; }
    </style>
</head>
<body>

<div class="nav">
    <a th:href="@{/dashboard}">← Dashboard</a>
</div>

<h2>👥 Gestão de Usuários</h2>

<div th:if="${mensagem}" class="alerta alerta-ok" th:text="${mensagem}"></div>
<div th:if="${erro}"     class="alerta alerta-erro" th:text="${erro}"></div>

<!-- Criar novo usuário -->
<div class="card">
    <h3>Novo Usuário</h3>
    <form th:action="@{/admin/usuarios/criar}" method="POST">
        <div class="form-grid">
            <div>
                <label>Login (username)</label>
                <input type="text" name="username" placeholder="ex: joao.silva" required>
            </div>
            <div>
                <label>Nome completo</label>
                <input type="text" name="nomeCompleto" placeholder="João da Silva" required>
            </div>
            <div>
                <label>Senha inicial</label>
                <input type="password" name="senha" placeholder="Mínimo 8 caracteres" required>
            </div>
            <div>
                <label>Perfil de acesso</label>
                <select name="role" required>
                    <option th:each="r : ${roles}"
                            th:value="${r}"
                            th:text="${r.name()}"></option>
                </select>
            </div>
        </div>
        <br>
        <button type="submit" class="btn btn-primary">Criar Usuário</button>
    </form>
</div>

<!-- Lista de usuários -->
<div class="card">
    <h3>Usuários cadastrados</h3>
    <table>
        <thead>
            <tr>
                <th>Username</th>
                <th>Nome</th>
                <th>Perfil</th>
                <th>Status</th>
                <th>Último login</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="u : ${usuarios}">
                <td th:text="${u.username}">—</td>
                <td th:text="${u.nomeCompleto ?: '—'}">—</td>
                <td>
                    <span class="badge"
                          th:classappend="${u.role.name() == 'ADMIN' ? 'badge-admin' :
                                           u.role.name() == 'OPERADOR' ? 'badge-op' : 'badge-view'}"
                          th:text="${u.role.name()}">—</span>
                </td>
                <td>
                    <span class="badge"
                          th:classappend="${u.ativo ? 'badge-op' : 'badge-inativo'}"
                          th:text="${u.ativo ? 'Ativo' : 'Inativo'}">—</span>
                </td>
                <td th:text="${u.ultimoLogin != null ?
                    #temporals.format(u.ultimoLogin, 'dd/MM/yyyy HH:mm') : 'Nunca'}">—</td>
                <td>
                    <div class="acoes">
                        <!-- Alterar role -->
                        <form th:action="@{/admin/usuarios/{id}/role(id=${u.id})}" method="POST"
                              style="display:flex;gap:4px;">
                            <select name="role" style="padding:4px;font-size:12px;width:auto;">
                                <option th:each="r : ${roles}"
                                        th:value="${r}"
                                        th:text="${r.name()}"
                                        th:selected="${r == u.role}"></option>
                            </select>
                            <button type="submit" class="btn btn-warning btn-sm">Salvar</button>
                        </form>

                        <!-- Ativar/Desativar -->
                        <form th:action="@{/admin/usuarios/{id}/status(id=${u.id})}" method="POST">
                            <input type="hidden" name="ativo" th:value="${!u.ativo}">
                            <button type="submit" class="btn btn-sm"
                                    th:class="${u.ativo ? 'btn btn-danger btn-sm' : 'btn btn-primary btn-sm'}"
                                    th:text="${u.ativo ? 'Desativar' : 'Reativar'}">—</button>
                        </form>

                        <!-- Reset de senha -->
                        <button class="btn btn-warning btn-sm"
                                th:data-uid="${u.id}"
                                th:data-uname="${u.username}"
                                onclick="abrirReset(this.dataset.uid, this.dataset.uname)">
                            Reset senha
                        </button>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<!-- Modal reset senha -->
<div id="modalReset" class="modal">
    <div class="modal-content">
        <h4>Redefinir senha</h4>
        <p id="modalResetInfo" style="color:#7f8c8d;font-size:13px;"></p>
        <form id="formReset" method="POST">
            <!--
                CSRF: como o action é definido via JS, o Thymeleaf não injetaria
                o token automaticamente. Adicionamos o campo hidden manualmente
                usando th:name e th:value para pegar o token da sessão.
            -->
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <label>Nova senha</label>
            <input type="password" name="novaSenha" placeholder="Mínimo 8 caracteres" required>
            <div style="display:flex;gap:8px;">
                <button type="submit" class="btn btn-warning">Redefinir</button>
                <button type="button" class="btn" style="background:#95a5a6;color:white;"
                        onclick="document.getElementById('modalReset').style.display='none'">
                    Cancelar
                </button>
            </div>
        </form>
    </div>
</div>

<script>
function abrirReset(id, username) {
    document.getElementById('modalResetInfo').textContent =
        'Redefinindo senha de: ' + username;
    document.getElementById('formReset').action = '/admin/usuarios/' + id + '/reset-senha';
    document.getElementById('modalReset').style.display = 'block';
}
window.onclick = e => {
    if (e.target === document.getElementById('modalReset'))
        document.getElementById('modalReset').style.display = 'none';
};
</script>
</body>
</html>
