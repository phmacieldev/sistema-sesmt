<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Alterar Senha — PGEO</title>
    <style>
        body { font-family: Arial; background: #f4f6f9; display: flex;
               align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 32px 40px; border-radius: 10px;
                box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 360px; }
        h2 { text-align: center; color: #2c3e50; margin-top: 0; }
        label { display: block; font-size: 13px; font-weight: bold; color: #555; margin-bottom: 4px; }
        input { width: 100%; padding: 9px; border: 1px solid #ddd; border-radius: 6px;
                font-size: 14px; margin-bottom: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 11px; background: #2ecc71; color: white;
                 border: none; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; }
        button:hover { background: #27ae60; }
        .nav { text-align: center; margin-bottom: 18px; }
        .nav a { color: #3498db; text-decoration: none; font-size: 14px; }
        .alerta { padding: 10px; border-radius: 6px; margin-bottom: 14px; font-size: 13px; }
        .alerta-ok   { background: #eafaf1; color: #27ae60; border: 1px solid #a9dfbf; }
        .alerta-erro { background: #fde8e8; color: #c0392b; border: 1px solid #f5b7b1; }
        .dica { font-size: 12px; color: #95a5a6; margin-top: -10px; margin-bottom: 14px; }
    </style>
</head>
<body>
<div class="card">
    <div class="nav"><a th:href="@{/dashboard}">← Voltar ao Dashboard</a></div>
    <h2>🔒 Alterar Senha</h2>

    <div th:if="${mensagem}" class="alerta alerta-ok" th:text="${mensagem}"></div>
    <div th:if="${erro}"     class="alerta alerta-erro" th:text="${erro}"></div>

    <form th:action="@{/minha-senha}" method="POST">
        <label>Senha atual</label>
        <input type="password" name="senhaAtual" required autofocus>

        <label>Nova senha</label>
        <input type="password" name="novaSenha" required>
        <p class="dica">Mínimo 8 caracteres.</p>

        <label>Confirmar nova senha</label>
        <input type="password" name="confirmarSenha" required>

        <button type="submit">Alterar Senha</button>
    </form>
</div>
</body>
</html>
