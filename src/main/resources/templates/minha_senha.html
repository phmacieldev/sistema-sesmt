<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Alterar Senha — PGEO</title>
  <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
  <link rel="stylesheet" th:href="@{/css/global.css}">
  <script th:src="@{/js/theme.js}"></script>
</head>
<body class="no-navbar">

<div class="senha-card">
  <div class="senha-header">
    <div class="senha-icon">🔑</div>
    <h1 class="senha-title">Alterar Senha</h1>
    <p class="senha-subtitle">
      <a th:href="@{/dashboard}">← Voltar ao Dashboard</a>
    </p>
  </div>

  <div th:if="${mensagem}" class="alert alert-success" th:text="${mensagem}"></div>
  <div th:if="${erro}"     class="alert alert-danger"  th:text="${erro}"></div>

  <form th:action="@{/minha-senha}" method="POST">
    <div class="form-group">
      <label class="form-label" for="senhaAtual">Senha atual</label>
      <input type="password" id="senhaAtual" name="senhaAtual"
             class="form-control" required autofocus>
    </div>
    <div class="form-group">
      <label class="form-label" for="novaSenha">Nova senha</label>
      <input type="password" id="novaSenha" name="novaSenha"
             class="form-control" required>
      <div class="form-hint">Mínimo 8 caracteres.</div>
    </div>
    <div class="form-group">
      <label class="form-label" for="confirmarSenha">Confirmar nova senha</label>
      <input type="password" id="confirmarSenha" name="confirmarSenha"
             class="form-control" required>
    </div>
    <button type="submit" class="btn btn-success btn-block btn-lg mt-8">
      Alterar Senha
    </button>
    <a th:href="@{/dashboard}" class="btn btn-secondary btn-block btn-lg mt-8">
      Cancelar
    </a>
  </form>
</div>

<div th:replace="~{components/footer :: footer}"></div>
</body>
</html>
