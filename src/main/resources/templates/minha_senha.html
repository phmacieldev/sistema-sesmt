<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Alterar Senha — PGEO</title>
  <link rel="stylesheet" th:href="@{/css/global.css}">
  <script th:src="@{/js/theme.js}"></script>
  <style>
    body.no-navbar {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }
    .senha-card {
      width: 100%;
      max-width: 400px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 32px;
      box-shadow: var(--shadow-lg);
    }
  </style>
</head>
<body class="no-navbar">

<div class="senha-card">
  <div style="text-align:center;margin-bottom:24px;">
    <div style="font-size:32px;margin-bottom:8px;">🔑</div>
    <h1 style="font-size:20px;font-weight:700;color:var(--text);margin:0;">Alterar Senha</h1>
    <p style="font-size:13px;color:var(--text-muted);margin-top:4px;">
      <a th:href="@{/dashboard}">← Voltar ao Dashboard</a>
    </p>
  </div>

  <div th:if="${mensagem}" class="alert alert-success" th:text="${mensagem}"></div>
  <div th:if="${erro}"     class="alert alert-danger"  th:text="${erro}"></div>

  <form th:action="@{/minha-senha}" method="POST">
    <div class="form-group">
      <label class="form-label" for="senhaAtual">Senha atual</label>
      <input type="password" id="senhaAtual" name="senhaAtual"
             class="form-control" required autofocus>
    </div>
    <div class="form-group">
      <label class="form-label" for="novaSenha">Nova senha</label>
      <input type="password" id="novaSenha" name="novaSenha"
             class="form-control" required>
      <div class="form-hint">Mínimo 8 caracteres.</div>
    </div>
    <div class="form-group">
      <label class="form-label" for="confirmarSenha">Confirmar nova senha</label>
      <input type="password" id="confirmarSenha" name="confirmarSenha"
             class="form-control" required>
    </div>
    <button type="submit" class="btn btn-success btn-block btn-lg" style="margin-top:8px;">
      Alterar Senha
    </button>
  </form>
</div>

</body>
</html>
