# =============================================
# PGEO — Perfil DEV (máquina local, sem Docker)
# Ativado com: SPRING_PROFILES_ACTIVE=dev
# Usar: mvn spring-boot:run -Dspring-boot.run.profiles=dev
# =============================================

# ── Banco H2 em memória ───────────────────────
# Sem instalar nada — dados somem ao reiniciar
app.rate-limit.enabled=false

spring.datasource.url=jdbc:h2:mem:pgeo;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA ───────────────────────────────────────
# create-drop: recria as tabelas a cada restart (perfeito para dev)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# ── Flyway desabilitado no dev ─────────────────
# O ddl-auto=create-drop já cuida do schema
spring.flyway.enabled=false

# ── Console web do H2 ─────────────────────────
# Acesse: http://localhost:8080/h2-console
# JDBC URL: jdbc:h2:mem:pgeo
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Thymeleaf ─────────────────────────────────
# Cache DESATIVADO para ver mudanças nos templates sem reiniciar
spring.thymeleaf.cache=false

# ── Logging verbose ───────────────────────────
logging.level.com.sesmt.pgeo=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

# ── Locale BR ─────────────────────────────────
spring.web.locale=pt_BR
spring.web.locale-resolver=fixed

# ── Sessão ─────────────────────────────────────
server.servlet.session.timeout=8h
server.servlet.session.cookie.http-only=true
