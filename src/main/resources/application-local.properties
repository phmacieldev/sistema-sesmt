# =============================================
# PGEO — Perfil LOCAL (IDE/Maven com Docker rodando)
# Conecta no PostgreSQL do container via localhost
#
# Pré-requisito: docker compose up -d db
# Usar: SPRING_PROFILES_ACTIVE=local
# =============================================

# ── Banco de Dados ────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/pgeo_db
spring.datasource.username=pgeo_user
spring.datasource.password=pgeo_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ───────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── Flyway ────────────────────────────────────
app.rate-limit.enabled=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ── Thymeleaf ─────────────────────────────────
spring.thymeleaf.cache=false

# ── Segurança (dev only) ─────────────────────
app.secret-key=local-dev-key-do-not-use-in-production
server.servlet.session.cookie.same-site=strict

# ── DevTools / Live Reload ────────────────────
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# ── Logging verbose ───────────────────────────
logging.level.com.sesmt.pgeo=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.flywaydb=INFO

# ── Locale BR ─────────────────────────────────
spring.web.locale=pt_BR
spring.web.locale-resolver=fixed

# ── Sessão ────────────────────────────────────
server.servlet.session.timeout=8h
server.servlet.session.cookie.http-only=true
