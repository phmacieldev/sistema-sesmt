name: Deploy — Railway

# ──────────────────────────────────────────────────────────────────────────────
# PRÉ-REQUISITOS (uma vez, no Railway + GitHub):
#
# 1. No Railway: Project Settings → Tokens → gerar um token do projeto.
# 2. No GitHub: Settings → Secrets and Variables → Actions → criar o secret
#    RAILWAY_TOKEN com o valor gerado acima.
# 3. Variáveis de ambiente da aplicação (DB_*, SECRET_KEY, ADMIN_PASSWORD, ...)
#    ficam configuradas direto no serviço do Railway, não aqui.
#
# Esse workflow só dispara o deploy depois que o CI (testes + build) passa no
# main — o Railway não decide isso por conta própria.
# ──────────────────────────────────────────────────────────────────────────────

on:
  workflow_run:
    workflows: ["CI — Build & Testes"]
    types: [completed]
    branches: [main]

  workflow_dispatch:

jobs:
  deploy:
    name: Deploy no Railway
    runs-on: ubuntu-latest

    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar Railway CLI
        run: npm install -g @railway/cli

      - name: Validar secret obrigatório
        run: |
          if [ -z "${{ secrets.RAILWAY_TOKEN }}" ]; then
            echo "ERRO: Secret RAILWAY_TOKEN não configurado."
            echo "Acesse: github.com/phmacieldev/sistema-sesmt → Settings → Secrets → Actions"
            exit 1
          fi

      - name: Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --detach

      - name: Resumo do deploy
        if: success()
        run: |
          echo "============================================"
          echo "  Deploy disparado com sucesso no Railway"
          echo "  Commit: ${{ github.sha }}"
          echo "============================================"
